name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Validar build Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: opalapa-gestao:ci
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Disparar deploy no Coolify
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via webhook
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK" ]; then
            echo "::warning::COOLIFY_WEBHOOK não configurado."
            echo "O deploy depende do Auto Deploy do Coolify (GitHub App) ou do secret COOLIFY_WEBHOOK."
            echo "Coolify → Application → General → Auto Deploy (ON) e Build Pack = Dockerfile."
            exit 0
          fi

          args=(-fsS --request GET "$COOLIFY_WEBHOOK")
          if [ -n "$COOLIFY_TOKEN" ]; then
            args+=(--header "Authorization: Bearer $COOLIFY_TOKEN")
          fi

          curl "${args[@]}"
          echo "Deploy disparado no Coolify."
