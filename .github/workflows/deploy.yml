name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Validar build Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: opalapa-gestao:ci
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Disparar deploy no Coolify
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via webhook
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${COOLIFY_WEBHOOK:-}" ]; then
            echo "::error::Secret COOLIFY_WEBHOOK não configurado no GitHub."
            echo "Coolify → Application → Webhooks → copie a Deploy Webhook URL"
            echo "GitHub → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

          echo "Disparando deploy no Coolify..."
          curl_args=(
            -sS
            -o /tmp/coolify-deploy-response.txt
            -w "%{http_code}"
            --request GET
            "$COOLIFY_WEBHOOK"
          )

          if [ -n "${COOLIFY_TOKEN:-}" ]; then
            curl_args+=(--header "Authorization: Bearer $COOLIFY_TOKEN")
          else
            echo "::warning::COOLIFY_TOKEN não configurado. Se o Coolify exigir Bearer token, o deploy falhará."
            echo "Coolify → Keys & Tokens → crie um API token com permissão Deploy"
          fi

          http_code="$(curl "${curl_args[@]}")"
          echo "Resposta do Coolify (HTTP ${http_code}):"
          cat /tmp/coolify-deploy-response.txt || true
          echo ""

          case "$http_code" in
            200|201|202|204)
              echo "Deploy disparado com sucesso."
              ;;
            401|403)
              echo "::error::Coolify recusou autenticação (HTTP ${http_code}). Configure COOLIFY_TOKEN."
              exit 1
              ;;
            *)
              echo "::error::Coolify retornou HTTP ${http_code}. Verifique a URL do webhook e o token."
              exit 1
              ;;
          esac
