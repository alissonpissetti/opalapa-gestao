name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker-build:
    name: Validar build Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: opalapa-gestao:ci
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Disparar deploy no Coolify
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via Coolify API
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          chmod +x scripts/coolify-deploy.sh
          if [ -z "${COOLIFY_WEBHOOK:-}" ]; then
            echo "::error::Secret COOLIFY_WEBHOOK não configurado no GitHub."
            echo "Coolify → Application → Webhooks → Deploy Webhook URL"
            echo "GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "${COOLIFY_TOKEN:-}" ]; then
            echo "::error::Secret COOLIFY_TOKEN não configurado no GitHub."
            echo "Coolify → Keys & Tokens → API token com permissão Deploy"
            echo "Coolify → Settings → Advanced → API Access (habilitar)"
            exit 1
          fi
          ./scripts/coolify-deploy.sh
